<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center h-screen">

  <form id="registerForm" class="bg-gray-800 p-6 rounded w-96 text-white space-y-3">
    <h2 class="text-xl font-bold">Register</h2>

    <input id="username" class="w-full p-2 bg-gray-700" placeholder="Username" required>
    <input id="email" type="email" class="w-full p-2 bg-gray-700" placeholder="Email" required>
    <input id="password" type="password" class="w-full p-2 bg-gray-700" placeholder="Password" required>

    <select id="role" class="w-full p-2 bg-gray-700">
      <option value="ADMIN">ADMIN</option>
      <option value="USER">USER</option>
    </select>

    <button id="btn" class="w-full bg-blue-600 p-2">Register</button>

    <p id="msg" class="text-sm"></p>

    <a href="login.html" class="text-blue-400 text-sm">Already have account?</a>
  </form>

  <script src="../js/register.js" type="module"></script>
</body>
</html>
